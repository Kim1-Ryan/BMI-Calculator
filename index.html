<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI is BS</title>
    <link href="style.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Original+Surfer&display=swap" rel="stylesheet">
</head>
<body>
    
    <img src="./BMIbs.webp" alt="BMI categories"/>

    <div class="form">
        
        <div class="input">
                
            <div class="form-group">
                <label for="weight">Weight (kg):</label>
                <input type="number" min="30" step="0.1" name="weight" id="weight" value="" placeholder="" required>
            </div>
            
            <div class="form-group">
                <label for="height">Height (m):</label>
                <input type="number" min="30" step="0.1" name="height" id="height" value="" placeholder="" required>
            </div>
            
        </div>
        
        <div class="submit">
                
            <div class="buttonContainer">
                <button class="btn" type="submit">Calculate</button>
            </div>
            
        </div>
    
    </div>

    <div class="result-message"></div>
    
    <script src="index.js"></script>
</body>
</html>
